## 概述

\`JDParser\` 是 HR Agent 系统的核心组件之一,负责将非结构化的职位描述(Job Description)文本转换为结构化数据。它是整个简历匹配流程的第一步,为后续的匹配和评分提供标准化的需求数据。

## 核心功能

### 功能定位

**职位描述解析器** - 自动从 JD 文本中提取关键信息

\`\`\`

┌──────────────────────────┐      ┌─────────────────────────┐
│ "招聘高级Python工程师     │      │ JDRequirements:        │
│  要求:                   │      │  - required_skills:    │
│  - 3年以上开发经验        │ ──▶  │    ["Python","FastAPI"]│
│  - 熟悉Python、FastAPI    │      │  - experience_years: 3 │
│  - 本科学历              │      │  - education_level:    │
│  - 良好的沟通能力"        │      │    "本科"              │
└──────────────────────────┘      │  - soft_skills:        │
   (自然语言文本)                    │    ["沟通能力"]        │
                                   └─────────────────────────┘
                                        (JSON 对象)
\`\`\`

## 工作原理

### 1. Prompt 工程

JDParser 使用精心设计的 prompt 引导 LLM 提取结构化信息:

\`\`\`\`python
_PROMPT_TEMPLATE = """你是一个职位需求提取助手。从职位描述中提取结构化信息,以JSON格式返回。

职位描述:
{jd_text}

请严格按照以下JSON格式返回(不要有任何其他文字):
\`\`\`json
{{
  "required_skills": ["提取的技能1", "技能2"],
  "experience_years": 提取的年限数字,
  "education_level": "本科",
  "soft_skills": ["软技能1", "软技能2"]
}}
\`\`\`\`

规则:

- required_skills: 技术技能列表
- experience_years: 工作年限(整数),未提及则为0
- education_level: 只能是 "大专"/"本科"/"硕士"/"博士" 之一,未提及则为"本科"
- soft_skills: 软技能列表(沟通能力、团队协作等)

只返回JSON,不要有其他解释文字。"""

\`\`\`\`

**设计要点**:
- ✅ 明确角色定位("职位需求提取助手")
- ✅ 提供清晰的 JSON 示例
- ✅ 定义默认值规则(未提及时的处理)
- ✅ 强调"只返回 JSON"(减少解释文字)

### 2. LLM 调用

使用 **MiniMax-M2.5** 模型进行语义理解和信息提取:

\`\`\`python
response = self.model.invoke([HumanMessage(content=prompt)])
content = response.content  # LLM 返回的文本
\`\`\`\`

### 3. 智能 JSON 提取

多策略提取 JSON,处理各种 LLM 响应格式:

\`\`\`\`python
# 策略 1: 提取 markdown 代码块
# 匹配: \`\`\`json { ... } \`\`\`
json_match = re.search(r"\`\`\`(?:json)?\\s*(\\{.*?\\})\\s*\`\`\`", content, re.DOTALL | re.IGNORECASE)
if json_match:
    content = json_match.group(1)

# 策略 2: 去除代码围栏
# 处理: \`\`\` { ... } \`\`\`
content = re.sub(r"^\`\`\`(?:json)?\\s*", "", content.strip(), flags=re.IGNORECASE)
content = re.sub(r"\\s*\`\`\`$", "", content.strip())

# 策略 3: 从文本中查找 JSON 对象
# 处理: 一些解释文字 { ... } 更多文字
if not content.startswith("{"):
    json_obj_match = re.search(r"\\{.*\\}", content, re.DOTALL)
    if json_obj_match:
        content = json_obj_match.group(0)
\`\`\`\`

**为什么需要多策略?**

LLM 返回的格式可能不一致:

- 有时带 markdown 代码块: \` \`\`\`json {...} \`\`\` \`
- 有时只有代码围栏: \` \`\`\` {...} \`\`\` \`
- 有时带解释文字: \`根据要求提取如下: {...} 以上是结果\`
- 有时是纯 JSON: \`{...}\`

### 4. 验证和转换

\`\`\`python
# JSON 解析
data = json.loads(content)

# Pydantic 模型验证
return JDRequirements(**data)
\`\`\`

Pydantic 会自动验证:

- 字段类型是否正确
- 必需字段是否存在
- 字段值是否符合约束

## 使用示例

### 基本使用

\`\`\`python
from app.pipeline.jd_parser import JDParser

# 创建解析器实例
parser = JDParser()

# 解析 JD 文本
jd_text = """
招聘Python工程师
要求:
- 3年Python开发经验
- 熟悉FastAPI
- 本科学历
"""

requirements = parser.parse(jd_text)

print(requirements.required_skills)    # ["Python", "FastAPI"]
print(requirements.experience_years)   # 3
print(requirements.education_level)    # "本科"
print(requirements.soft_skills)        # []
\`\`\`

### 在 Agent 工具中使用

\`\`\`python
# app/agent/tools/parse_jd.py
from app.pipeline.jd_parser import JDParser

_parser: JDParser | None = None

def _get_parser() -&gt; JDParser:
    global _parser
    if _parser is None:
        _parser = JDParser()
    return _parser

@tool("parse_jd")
def parse_jd_tool(jd_text: str) -&gt; str:
    """解析职位描述文本，提取结构化需求"""
    requirements = _get_parser().parse(jd_text)
    return json.dumps(requirements.model_dump(), ensure_ascii=False)
\`\`\`

## 错误处理

### 常见错误类型

#### 1. 空响应错误

\`\`\`python
ValueError: LLM returned empty response
\`\`\`

**原因**: LLM API 返回空内容
**可能场景**:

- API 配额耗尽
- 网络问题
- 内容审查拦截

#### 2. JSON 解析错误

\`\`\`python
ValueError: Failed to parse JSON from LLM response: Expecting value: line 1 column 1 (char 0)
Content: &lt;实际内容&gt;
\`\`\`

**原因**: LLM 返回的不是有效 JSON
**可能场景**:

- LLM 返回纯文本解释
- JSON 格式错误
- 提取策略失败

#### 3. 字段验证错误

\`\`\`python
pydantic.ValidationError: 1 validation error for JDRequirements
experience_years
  Input should be a valid integer
\`\`\`

**原因**: LLM 返回的字段类型不符合预期
**可能场景**:

- \`experience_years\` 是字符串 "3年" 而不是整数 3
- \`required_skills\` 是字符串而不是列表

### 调试方法

#### 启用 DEBUG 日志

\`\`\`python
import logging
logging.basicConfig(level=logging.INFO)

# 运行 parser,会输出:
# [DEBUG] LLM raw response (len=256): ...
# [DEBUG] Extracted from markdown: ...
# [DEBUG] Final content: ...
\`\`\`

#### 查看 LLM 原始响应

\`\`\`python
parser = JDParser()
try:
    requirements = parser.parse(jd_text)
except ValueError as e:
    print(f"解析失败: {e}")
    # 错误消息中会包含 LLM 返回内容的前 500 字符
\`\`\`

\`\`\`
成功场景:
- LLM 调用: 1-3 秒
- JSON 提取和验证: &lt;10 毫秒
- 总耗时: ~1-3 秒

失败场景:
- LLM 超时: 10+ 秒
- 重试: 取决于重试策略
\`\`\`

## 常见问题 (FAQ)

### Q1: JDParser 支持哪些语言?

**A**: 目前 prompt 是中文设计的,主要支持中文 JD。如需支持英文或其他语言,需要修改 \`_PROMPT_TEMPLATE\`。

### Q2: 如何提高解析准确率?

**A**:

1. 改进 prompt 模板,提供更清晰的示例
2. 在 prompt 中添加领域专有名词列表
3. 使用更强大的 LLM 模型
4. 对特定行业定制 prompt

### Q3: 解析失败率大概多少?

**A**:

- 正常格式的 JD: &lt;5% 失败率
- 格式混乱的 JD: 10-20% 失败率
- 主要失败原因: LLM 返回格式不符合预期

### Q4: 能否不使用 LLM,直接用规则提取?

**A**: 可以,但效果会差很多:

- ✅ 规则方法: 速度快,成本低
- ❌ 规则方法: 准确率低,维护困难
- ✅ LLM 方法: 准确率高,适应性强
- ❌ LLM 方法: 速度慢,有调用成本

### Q5: 如何处理复杂的 JD(如多个岗位合并)?

**A**:

1. 在 prompt 中明确说明"只提取第一个岗位"
2. 或者预处理 JD,拆分成多个独立岗位
3. 或者扩展 \`JDRequirements\` 模型支持多岗位

## 概述

\`Matcher\` 是 HR Agent 系统的核心评分组件,负责将候选人简历与职位需求进行多维度匹配,计算各个维度的匹配分数。它是连接 JDParser 和 Reporter 的桥梁,在整个评估流程中处于核心位置。

## 工作原理

### 匹配流程

\`\`\`
Matcher.match(resume, requirements)
    │
    ├─▶ 1. 计算工作年限
    │      _calculate_years(experience)
    │      → 从 "3年", "2年6个月" 提取总年数
    │
    ├─▶ 2. 提取最高学历
    │      _get_highest_degree(education)
    │      → 按 博士&gt;硕士&gt;本科&gt;大专 排序
    │
    ├─▶ 3. 调用 Scorer 计算各维度
    │      │
    │      ├─▶ score_hard_skills(resume.skills, required_skills)
    │      │    • 大小写不敏感匹配
    │      │    • 计算匹配率: matched/required * 100
    │      │
    │      ├─▶ score_experience(resume_years, required_years)
    │      │    • 计算达成率: actual/required * 100
    │      │    • 上限100分
    │      │
    │      ├─▶ score_education(resume_degree, required_degree)
    │      │    • 学历等级映射: 大专(2), 本科(3), 硕士(4), 博士(5)
    │      │    • 达标得100分,不达标按比例
    │      │
    │      └─▶ score_soft_skills(resume_skills, required_skills)
    │           • 精确字符串匹配
    │           • 计算匹配率: matched/required * 100
    │
    └─▶ 4. 返回维度评分字典
\`\`\`

### 核心算法详解

#### 1. 技术技能匹配 (Hard Skills)

\`\`\`python
def score_hard_skills(resume_skills, required_skills):
    # 大小写不敏感匹配
    resume_lower = [s.lower() for s in resume_skills]

    # 计算匹配和缺失
    matched = [s for s in required_skills if s.lower() in resume_lower]
    missing = [s for s in required_skills if s.lower() not in resume_lower]

    # 计算分数
    score = len(matched) / len(required_skills) * 100

    return DimensionScore(score=score, matched=matched, missing=missing)
\`\`\`

**特点**:

- ✅ 大小写不敏感 ("python" 匹配 "Python")
- ✅ 部分匹配 (有3个中的2个得 66分)
- ✅ 记录匹配和缺失项

**示例**:

\`\`\`python
resume_skills = ["Python", "FastAPI", "PostgreSQL"]
required_skills = ["Python", "FastAPI", "Docker"]

result = {
    "score": 66,  # 2/3 = 66.67
    "matched": ["Python", "FastAPI"],
    "missing": ["Docker"]
}
\`\`\`

#### 2. 工作经验匹配 (Experience)

\`\`\`python
def score_experience(resume_years, required_years):
    if required_years == 0:
        return DimensionScore(score=100, detail="无年限要求")

    score = min(resume_years / required_years * 100, 100)

    return DimensionScore(
        score=score,
        detail=f"{resume_years}年 vs 要求{required_years}年"
    )
\`\`\`

**评分规则**:

\`\`\`
实际年限 / 要求年限 * 100, 上限100分

示例:
- 3年 vs 要求3年 → 100分
- 5年 vs 要求3年 → 100分 (超出也是100)
- 2年 vs 要求3年 → 66分
- 0年 vs 要求3年 → 0分
\`\`\`

**年限提取**:

\`\`\`python
def _calculate_years(experiences):
    total = 0
    for exp in experiences:
        # 从 "3年" 或 "3年6个月" 提取数字
        match = re.search(r'(\\d+)年', exp.duration)
        if match:
            total += int(match.group(1))
    return total
\`\`\`

#### 3. 教育背景匹配 (Education)

\`\`\`python
EDUCATION_LEVELS = {
    "大专": 2,
    "本科": 3,
    "硕士": 4,
    "博士": 5
}

def score_education(resume_degree, required_degree):
    actual = EDUCATION_LEVELS.get(resume_degree, 0)
    required = EDUCATION_LEVELS.get(required_degree, 0)

    if actual &gt;= required:
        score = 100  # 达标或超标
    else:
        score = actual / required * 100  # 不达标按比例

    return DimensionScore(
        score=score,
        detail=f"{resume_degree} vs 要求{required_degree}"
    )
\`\`\`

**评分示例**:

\`\`\`
硕士 vs 要求本科 → 100分 (超标)
本科 vs 要求本科 → 100分 (达标)
大专 vs 要求本科 → 66分  (2/3)
本科 vs 要求硕士 → 75分  (3/4)
\`\`\`

#### 4. 软技能匹配 (Soft Skills)

\`\`\`python
def score_soft_skills(resume_skills, required_skills):
    # 精确字符串匹配 (区分大小写)
    matched = [s for s in required_skills if s in resume_skills]
    missing = [s for s in required_skills if s not in resume_skills]

    score = len(matched) / len(required_skills) * 100

    return DimensionScore(score=score, matched=matched, missing=missing)
\`\`\`

**注意**: 软技能使用精确匹配,不做大小写转换

## 辅助方法

### \\_calculate_years()

**作用**: 从工作经历列表中提取总工作年限

\`\`\`python
def _calculate_years(self, experiences: list) -&gt; int:
    total = 0
    for exp in experiences:
        # 正则匹配 "X年"
        match = re.search(r'(\\d+)年', exp.duration)
        if match:
            total += int(match.group(1))
    return total
\`\`\`

**支持的格式**:

- ✅ "3年" → 3
- ✅ "3年6个月" → 3 (忽略月份)
- ✅ "5年2个月" → 5
- ❌ "36个月" → 0 (不支持)
- ❌ "Three years" → 0 (不支持英文)

### \\_get_highest_degree()

**作用**: 从教育经历列表中提取最高学历

\`\`\`python
def _get_highest_degree(self, education: list) -&gt; str:
    degrees = [e.degree for e in education]
    priority = ["博士", "硕士", "本科", "大专"]

    # 按优先级查找
    for d in priority:
        if d in degrees:
            return d

    # 默认本科
    return "本科"
\`\`\`

**示例**:

\`\`\`python
education = [
    Education(degree="本科", ...),
    Education(degree="硕士", ...)
]
# 返回: "硕士"

education = [
    Education(degree="大专", ...)
]
# 返回: "大专"

education = []
# 返回: "本科" (默认)
\`\`\`

## 评分权重

Matcher 使用 \`Scorer\` 类计算综合分数时的权重分配:

WEIGHTS = {
    "hard_skills": 0.4,    # 40% - 技术技能最重要
    "experience": 0.3,     # 30% - 工作经验其次
    "education": 0.15,     # 15% - 教育背景
    "soft_skills": 0.15    # 15% - 软技能
}

overall_score = (
    hard_skills_score * 0.4 +
    experience_score * 0.3 +
    education_score * 0.15 +
    soft_skills_score * 0.15
)

**权重设计理念**:

- 技术岗位以技能和经验为主

实际场景:

## 常见问题 (FAQ)

### Q1: 为什么技术技能匹配是大小写不敏感的,但软技能不是?

**A**:

- **技术技能**: 通常是缩写或专有名词,大小写变体多 ("python", "Python", "PYTHON")
- **软技能**: 通常是完整词组,格式统一 ("沟通能力", "团队协作")
- 如需统一,可以修改 \`score_soft_skills\` 方法

### Q2: 如何调整各维度的权重?

**A**: 修改 \`Scorer\` 类的 \`WEIGHTS\` 字典:

\`\`\`python
# app/utils/scorer.py
WEIGHTS = {
    "hard_skills": 0.5,    # 提高技术技能权重到50%
    "experience": 0.3,
    "education": 0.1,
    "soft_skills": 0.1
}
\`\`\`

### Q3: 年限计算不支持"月"怎么办?

**A**: 可以改进 \`_calculate_years\` 方法:

\`\`\`python
def _calculate_years(self, experiences: list) -&gt; float:
    total_months = 0
    for exp in experiences:
        # 匹配 "X年Y个月"
        year_match = re.search(r'(\\d+)年', exp.duration)
        month_match = re.search(r'(\\d+)个月', exp.duration)

        if year_match:
            total_months += int(year_match.group(1)) * 12
        if month_match:
            total_months += int(month_match.group(1))

    return total_months / 12  # 转换为年
\`\`\`

### Q4: 如何处理同义技能?

**A**: 可以引入技能映射表:

\`\`\`python
SKILL_SYNONYMS = {
    "js": "javascript",
    "ts": "typescript",
    "py": "python",
    "k8s": "kubernetes"
}

def normalize_skill(skill: str) -&gt; str:
    lower = skill.lower()
    return SKILL_SYNONYMS.get(lower, lower)
\`\`\`

### Q5: 如何支持技能的模糊匹配?

**A**: 可以使用字符串相似度算法:

\`\`\`python
from difflib import SequenceMatcher

def fuzzy_match(skill1: str, skill2: str, threshold=0.8) -&gt; bool:
    ratio = SequenceMatcher(None, skill1.lower(), skill2.lower()).ratio()
    return ratio &gt;= threshold
\`\`\`

## 概述

\`Reporter\` 是 HR Agent 系统的报告生成组件,负责将多维度评分结果转换为最终的评估报告,包括综合评分、推荐结论和评估理由。它是评估流程的最后一步,将量化数据转化为可理解的决策依据。

## 核心功能

### 功能定位

**报告生成器** - 将评分数据转换为结构化报告

\`\`\`
输入:                                  输出:
┌─────────────────────┐              ┌──────────────────────┐
│ DimensionScores:    │              │ MatchReport:         │
│  hard_skills: 80    │              │  overall_score: 82   │
│  experience: 100    │  ─▶ Reporter ─▶ recommendation:     │
│  education: 100     │              │    "推荐"            │
│  soft_skills: 75    │              │  reasons: [...]      │
└─────────────────────┘              │  dimensions: {...}   │
                                     └──────────────────────┘
\`\`\`

## 在系统中的位置

\`\`\`
评估流程:
JDParser → Matcher → Reporter → 最终报告
                       ▲
                    这里!
\`\`\`

    dimensions: dict            # 各维度详细得分

## 工作原理

### 报告生成流程

\`\`\`
Reporter.generate(dimension_scores)
    │
    ├─▶ 1. 计算综合评分
    │      scorer.calculate_overall()
    │      • 加权求和: 技能40% + 经验30% + 学历15% + 软技能15%
    │
    ├─▶ 2. 生成推荐结论
    │      overall &gt;= 70 → "推荐"
    │      overall &lt; 70  → "不推荐"
    │
    ├─▶ 3. 提取评估理由
    │      • 技术栈匹配度高 (hard_skills &gt;= 80)
    │      • 工作经验符合要求 (experience == 100)
    │      • 教育背景符合要求 (education == 100)
    │      • 软技能匹配 (soft_skills &gt;= 80)
    │
    └─▶ 4. 返回 MatchReport
\`\`\`

### 核心算法

#### 1. 综合评分计算

\`\`\`python
def calculate_overall(dimension_scores: dict) -&gt; int:
    """
    使用加权求和计算综合评分

    权重分配:
    - 技术技能: 40%
    - 工作经验: 30%
    - 教育背景: 15%
    - 软技能: 15%
    """
    total = 0
    for dim, weight in WEIGHTS.items():
        if dim in dimension_scores:
            total += dimension_scores[dim].score * weight
    return int(total)
\`\`\`

**示例**:

\`\`\`python
scores = {
    "hard_skills": 80,
    "experience": 100,
    "education": 100,
    "soft_skills": 60
}

overall = 80*0.4 + 100*0.3 + 100*0.15 + 60*0.15
        = 32 + 30 + 15 + 9
        = 86
\`\`\`

#### 2. 推荐阈值

\`\`\`python
THRESHOLD = 70  # 推荐阈值

recommendation = "推荐" if overall &gt;= 70 else "不推荐"
\`\`\`

**设计理念**:

- 70分作为及格线
- 可根据业务需求调整阈值
- 建议范围: 60-80分

#### 3. 理由提取规则

\`\`\`python
reasons = []

# 技术栈匹配度高
if hard_skills_score &gt;= 80:
    reasons.append("技术栈匹配度高")

# 工作经验符合要求
if experience_score &gt;= 100:
    reasons.append("工作经验符合要求")

# 教育背景符合要求
if education_score &gt;= 100:
    reasons.append("教育背景符合要求")

# 软技能匹配
if soft_skills_score &gt;= 80:
    reasons.append("软技能匹配")

# 兜底理由
if not reasons:
    reasons.append("综合评估结果")
\`\`\`

### 自定义理由规则

\`\`\`python
class CustomReporter(Reporter):
    def generate(self, dimension_scores: dict) -&gt; dict:
        overall = self.scorer.calculate_overall(dimension_scores)
        recommendation = "推荐" if overall &gt;= THRESHOLD else "不推荐"

        # 自定义理由逻辑
        reasons = self._custom_reasons(dimension_scores, overall)

        return {
            "overall_score": overall,
            "dimensions": {k: v.model_dump() for k, v in dimension_scores.items()},
            "recommendation": recommendation,
            "reasons": reasons
        }

    def _custom_reasons(self, scores: dict, overall: int) -&gt; list[str]:
        reasons = []

        # 更细粒度的理由
        hard = scores.get("hard_skills", DimensionScore(score=0)).score
        if hard &gt;= 90:
            reasons.append("技能完美匹配")
        elif hard &gt;= 80:
            reasons.append("技能匹配度高")
        elif hard &gt;= 60:
            reasons.append("技能基本匹配")

        # ... 其他维度

        return reasons

    │      • score_candidate (闭包,绑定 session_id)
    │      • generate_report_html (闭包,绑定 session_id)
    │
    ├─▶ 3. 创建 ReAct Agent
    │      create_react_agent(model, tool_node)
    │
    ├─▶ 4. 构建提示消息
    │      SystemMessage: 角色定义 + 工具调用顺序
    │      HumanMessage: 具体任务 + JD + 简历
    │
    ├─▶ 5. Agent 执行循环
    │      graph.invoke(messages)
    │      ┌──────────────────────────┐
    │      │ LLM 推理 → 决定调用工具   │
    │      │   ↓                      │
    │      │ 调用 parse_jd            │
    │      │   ↓                      │
    │      │ 观察结果 → 继续推理       │
    │      │   ↓                      │
    │      │ 调用 score_candidate     │
    │      │   ↓                      │
    │      │ 观察结果 → 继续推理       │
    │      │   ↓                      │
    │      │ 调用 generate_report_html│
    │      │   ↓                      │
    │      │ 生成总结                 │
    │      └──────────────────────────┘
    │
    ├─▶ 6. 提取推理总结
    │      从 AIMessage 中提取最后的推理内容
    │
    ├─▶ 7. 从 store 获取结果
    │      report_dict = _report_store[session_id]
    │      html = _html_store[session_id]
    │
    └─▶ 8. 返回 AgentResult
\`\`\`

### 工具绑定机制

\`\`\`python
def _make_tools(session_id: str) -&gt; list:
    """通过闭包将 session_id 绑定到工具"""
    
    @tool
    def score_candidate(resume: dict, requirements: dict) -&gt; str:
        result = run_score_candidate(resume, requirements)
        _report_store[session_id] = result  # 存储到 session store
        return json.dumps(result, ensure_ascii=False)
    
    @tool
    def generate_report_html(report: dict) -&gt; str:
        html = run_generate_report_html(report)
        _html_store[session_id] = html  # 存储到 session store
        return "html_generated"
    
    return [parse_jd_tool, score_candidate, generate_report_html]

## 常见问题 (FAQ)

### Q1: 为什么使用 ReAct 而不是简单的顺序调用?

**A**: 
- ReAct 提供灵活性,LLM 可以根据中间结果调整策略
- 支持错误重试和异常处理
- 可扩展性强,易于添加新工具

### Q2: Session Store 什么时候清理?

**A**: 当前版本没有自动清理。建议:

# 定时清理
from apscheduler.schedulers.background import BackgroundScheduler

def cleanup_old_sessions():
    # 清理 1 小时前的 session
    pass

scheduler = BackgroundScheduler()
scheduler.add_job(cleanup_old_sessions, 'interval', hours=1)
\`\`\`

### Q3: 如何限制 Agent 的最大迭代次数?

graph.invoke(
    messages,
    config={
        "configurable": {"thread_id": session_id},

def run_score_candidate(resume: dict, requirements: dict) -&gt; dict:
    """实际执行评分"""
    # 1. 反序列化
    resume_obj = Resume(**resume)
    requirements_obj = Requirements(**requirements)

    dimension_scores = matcher.match(resume_obj, requirements_obj)
    
    # 3. 生成报告
    reporter = Reporter()
    report = reporter.generate(dimension_scores)
    
    return report

## 工具装饰器

### @traced_tool

记录工具执行的详细日志,包括输入、输出、耗时和状态。

\`\`\`python
# app/utils/logger.py
def traced_tool(tool_name: str = None):
    def decorator(func: Callable) -&gt; Callable:
        @wraps(func)
        def wrapper(*args, **kwargs):
            name = tool_name or func.__name__
            
            # 输入预览
            input_preview = _format_input(args, kwargs)
            logger.info(f"[{name}] START Input: {input_preview}")
            
            start_time = time.time()
            try:
                result = func(*args, **kwargs)
                duration = (time.time() - start_time) * 1000
                output_preview = _format_output(result)
                logger.info(f"[{name}] END Duration: {duration:.2f}ms Status: success Output: {output_preview}")
                return result
            except Exception as e:
                duration = (time.time() - start_time) * 1000
                logger.error(f"[{name}] END Duration: {duration:.2f}ms Status: error Output: None Error: {e}")
                raise
        
        return wrapper
    return decorator
\`\`\`

### 装饰器顺序

⚠️ **重要**: \`@tool\` 必须在 \`@traced_tool\` 之后应用

\`\`\`python
# ✅ 正确
@traced_tool("my_tool")
@tool
def my_tool():
    pass

# ❌ 错误 (TypeError: 'StructuredTool' object is not callable)
@tool
@traced_tool("my_tool")
def my_tool():
    pass
\`\`\`

**原因**: 
- \`@tool\` 将函数转换为 \`StructuredTool\` 对象 (LangChain)
- \`@traced_tool\` 需要包装原始的可调用函数
- 顺序错误会导致 \`@traced_tool\` 尝试包装一个不可调用的对象

## 常见问题 (FAQ)

### Q1: 为什么工具返回字符串而不是对象?

**A**: LangChain 的 \`@tool\` 装饰器要求工具返回可序列化的类型 (str, int, dict 等)。字符串是最通用的格式。

### Q2: 为什么 generate_report_html 返回 "html_generated" 而不是实际 HTML?

**A**: 
- LLM 不需要看到完整的 HTML 内容 (太长,浪费 tokens)
- 实际 HTML 通过 session store 传递给 HRAgent
- 这是一种"副作用"模式 (side effect)

### Q3: 如何添加新工具?

**A**: 
\`\`\`python
# 1. 创建工具文件
# app/agent/tools/my_new_tool.py

from langchain_core.tools import tool
from app.utils.logger import traced_tool

@traced_tool("my_new_tool")
@tool
def my_new_tool(param: str) -&gt; str:
    """工具描述,LLM 会看到这个"""
    result = do_something(param)
    return str(result)

# 2. 在 HRAgent 中注册
def _make_tools(session_id: str) -&gt; list:
    return [
        parse_jd_tool,
        score_candidate,
        generate_report_html,
        my_new_tool  # 新工具
    ]
\`\`\`

### Q4: 装饰器顺序记不住怎么办?

**A**: 记住口诀: **"追踪在前,工具在后"** (\`@traced_tool\` → \`@tool\`)

from cachetools import TTLCache

_tool_cache = TTLCache(maxsize=100, ttl=300)  # 5分钟过期

@traced_tool("parse_jd")
@tool
def parse_jd(jd_text: str) -&gt; str:
    cache_key = hash(jd_text)
    if cache_key in _tool_cache:
        return _tool_cache[cache_key]
    
    result = run_parse_jd(jd_text)
    _tool_cache[cache_key] = result
    return result

                    const content = markdownContent[slug].toLowerCase();

                        if (!found) {

                            document.querySelector(`[data-section="${slug}"]`).click();
                            found = true;
                        }

                        const activeSection = document.querySelector('.section.active');
                        const walker = document.createTreeWalker(
                            activeSection,
                            NodeFilter.SHOW_TEXT,
                            null,
                            false
                        );
                        
                        const nodesToReplace = [];
                        while (walker.nextNode()) {
                            const node = walker.currentNode;
                            if (node.nodeValue.toLowerCase().includes(query)) {
                                nodesToReplace.push(node);
                            }
                        }
                        
                        nodesToReplace.forEach(node => {
                            const span = document.createElement('span');
                            const regex = new RegExp(`(${query})`, 'gi');
                            span.innerHTML = node.nodeValue.replace(regex, '<span class="search-highlight">$1</span>');

                        });
